<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Where Should They Form Their LLC?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --nwra-navy:#13384F;
    --nwra-navy-mid:#1F5082;
    --nwra-blue:#448CCE;
    --nwra-blue-light:#D6E4F2;
    --nwra-blue-soft:#EEF3F9;
    --nwra-gold:#DD9E2D;
    --nwra-gold-soft:#FDF4E4;
    --nwra-green:#008761;
    --nwra-gray:#F0F0F0;
    --nwra-text:#242424;
    --nwra-muted:#5A6B7A;
    --nwra-faint:#7A8A99;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Montserrat',sans-serif;
    background:var(--nwra-gray);
    color:var(--nwra-text);
    padding:32px 16px;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
  }
  .progress-track{
    height:5px;
    background:var(--nwra-blue-soft);
    border-radius:99px;
    overflow:hidden;
    margin-bottom:24px;
  }
  .progress-fill{
    height:100%;
    background:var(--nwra-blue);
    border-radius:99px;
    transition:width .3s ease;
    width:0%;
  }
  .card{
    background:#fff;
    border-radius:16px;
    padding:32px;
    box-shadow:0 2px 20px rgba(19,56,79,0.06);
  }
  h1.title{
    margin:0 0 4px;
    font-size:22px;
    font-weight:800;
    color:var(--nwra-navy);
    text-align:center;
  }
  p.subtitle{
    margin:0 0 28px;
    text-align:center;
    color:var(--nwra-muted);
    font-size:14px;
  }
  .question{
    font-size:19px;
    font-weight:700;
    color:var(--nwra-navy);
    margin:0 0 20px;
    line-height:1.4;
  }
  select.answer-select{
    width:100%;
    padding:14px 16px;
    font-family:'Montserrat',sans-serif;
    font-size:15px;
    font-weight:600;
    color:var(--nwra-text);
    border:2px solid var(--nwra-blue-light);
    border-radius:12px;
    background:#fff;
    margin-bottom:16px;
    cursor:pointer;
  }
  select.answer-select:focus{
    outline:none;
    border-color:var(--nwra-blue);
  }
  .answers{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-bottom:8px;
  }
  .answer-btn{
    width:100%;
    text-align:left;
    background:#fff;
    border:2px solid var(--nwra-blue-light);
    border-radius:12px;
    padding:16px 18px;
    font-family:'Montserrat',sans-serif;
    font-size:15px;
    font-weight:600;
    color:var(--nwra-navy);
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease;
  }
  .answer-btn:hover{
    border-color:var(--nwra-blue);
    background:var(--nwra-blue-soft);
  }
  .nav-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:24px;
  }
  .back-btn{
    background:none;
    border:none;
    color:var(--nwra-muted);
    font-family:'Montserrat',sans-serif;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    padding:8px 0;
    text-transform:uppercase;
    letter-spacing:0.05em;
  }
  .back-btn:hover{
    color:var(--nwra-navy);
  }
  .continue-btn{
    background:var(--nwra-blue);
    color:#fff;
    border:none;
    border-radius:8px;
    padding:14px 28px;
    font-family:'Montserrat',sans-serif;
    font-size:13px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.07em;
    cursor:pointer;
    transition:background .15s ease;
  }
  .continue-btn:hover{
    background:var(--nwra-navy-mid);
  }
  .continue-btn:disabled{
    background:var(--nwra-faint);
    cursor:not-allowed;
  }

  /* result page */
  .banner{
    border-radius:16px;
    padding:32px;
    color:#fff;
    margin-bottom:20px;
  }
  .banner.green{ background:linear-gradient(135deg,#008761,#04694C); }
  .banner.blue{ background:linear-gradient(135deg,var(--nwra-blue),var(--nwra-navy)); }
  .banner.gold{ background:linear-gradient(135deg,var(--nwra-gold),#B97F18); }
  .banner .eyebrow{
    font-size:12px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.1em;
    opacity:0.85;
    margin:0 0 8px;
  }
  .banner h2{
    margin:0 0 10px;
    font-size:28px;
    font-weight:800;
  }
  .banner p{
    margin:0;
    font-size:15px;
    line-height:1.5;
    opacity:0.95;
  }
  .notes{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:20px;
  }
  .note{
    background:var(--nwra-blue-soft);
    border-left:4px solid var(--nwra-blue);
    border-radius:8px;
    padding:12px 16px;
    font-size:13.5px;
    color:var(--nwra-navy);
    line-height:1.5;
  }
  .playbook-card{
    background:#fff;
    border-radius:16px;
    padding:24px;
    box-shadow:0 2px 20px rgba(19,56,79,0.06);
  }
  .playbook-card h3{
    margin:0 0 16px;
    font-size:16px;
    font-weight:800;
    color:var(--nwra-navy);
  }
  .playbook-card ol{
    margin:0;
    padding-left:20px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .playbook-card li{
    font-size:13.5px;
    color:var(--nwra-muted);
    line-height:1.55;
  }
  .playbook-card li strong{
    color:var(--nwra-navy);
    font-weight:700;
  }
  .start-over-row{
    text-align:center;
    margin-top:24px;
  }
  .start-over-btn{
    background:none;
    border:2px solid var(--nwra-blue-light);
    color:var(--nwra-navy);
    border-radius:8px;
    padding:12px 24px;
    font-family:'Montserrat',sans-serif;
    font-size:13px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.07em;
    cursor:pointer;
  }
  .start-over-btn:hover{
    border-color:var(--nwra-blue);
    background:var(--nwra-blue-soft);
  }
  .hidden{ display:none !important; }
  @media (max-width:600px){
    .card{ padding:24px; }
    .playbook-card{ padding:20px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

  <div class="card" id="quizCard">
    <h1 class="title">Where Should They Form Their LLC?</h1>
    <p class="subtitle">Walk through the caller's situation to find the right state.</p>

    <div id="questionArea"></div>

    <div class="nav-row">
      <button class="back-btn" id="backBtn">&larr; Back</button>
      <span></span>
    </div>
  </div>

  <div id="resultArea" class="hidden"></div>
</div>

<script>
const STATES = ["Alabama","Alaska","Arizona","Arkansas","California","Colorado","Connecticut","Delaware","Florida","Georgia","Hawaii","Idaho","Illinois","Indiana","Iowa","Kansas","Kentucky","Louisiana","Maine","Maryland","Massachusetts","Michigan","Minnesota","Mississippi","Missouri","Montana","Nebraska","Nevada","New Hampshire","New Jersey","New Mexico","New York","North Carolina","North Dakota","Ohio","Oklahoma","Oregon","Pennsylvania","Rhode Island","South Carolina","South Dakota","Tennessee","Texas","Utah","Vermont","Virginia","Washington","West Virginia","Wisconsin","Wyoming"];

let state = {
  step: "q2",
  history: [],
  flags: {},
  answers: {}
};

const questionArea = document.getElementById('questionArea');
const resultArea = document.getElementById('resultArea');
const quizCard = document.getElementById('quizCard');
const progressFill = document.getElementById('progressFill');
const backBtn = document.getElementById('backBtn');

const STEP_ORDER = ["q2","q3","q3b","q3c","q3d","q4","q4b","q5","q6"];

function progressFor(step){
  const idx = STEP_ORDER.indexOf(step);
  const pct = idx === -1 ? 100 : Math.round(((idx) / STEP_ORDER.length) * 100);
  return Math.min(pct, 95);
}

function goTo(step, fromHistoryPush){
  if(fromHistoryPush !== false){
    state.history.push(state.step);
  }
  state.step = step;
  render();
}

function goBack(){
  if(state.history.length === 0) return;
  const prev = state.history.pop();
  state.step = prev;
  render();
}

function startOver(){
  state = { step:"q2", history:[], flags:{}, answers:{} };
  resultArea.classList.add('hidden');
  resultArea.innerHTML = '';
  quizCard.classList.remove('hidden');
  render();
}

function buildOptions(list){
  const div = document.createElement('div');
  div.className = 'answers';
  list.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = opt.label;
    btn.onclick = opt.onClick;
    div.appendChild(btn);
  });
  return div;
}

function buildStateSelect(onContinue, defaultLabel){
  const wrap = document.createElement('div');
  const select = document.createElement('select');
  select.className = 'answer-select';
  const placeholder = document.createElement('option');
  placeholder.textContent = defaultLabel || 'Select a state...';
  placeholder.value = '';
  placeholder.disabled = true;
  placeholder.selected = true;
  select.appendChild(placeholder);
  STATES.forEach(s => {
    const o = document.createElement('option');
    o.value = s;
    o.textContent = s;
    select.appendChild(o);
  });
  wrap.appendChild(select);

  const continueBtn = document.createElement('button');
  continueBtn.className = 'continue-btn';
  continueBtn.textContent = 'Continue';
  continueBtn.disabled = true;
  continueBtn.onclick = () => onContinue(select.value);
  select.addEventListener('change', () => {
    continueBtn.disabled = !select.value;
  });

  const row = document.createElement('div');
  row.style.textAlign = 'right';
  row.style.marginTop = '8px';
  row.appendChild(continueBtn);
  wrap.appendChild(row);

  return wrap;
}

function renderQuestionHeader(text){
  const q = document.createElement('div');
  q.className = 'question';
  q.textContent = text;
  return q;
}

function render(){
  progressFill.style.width = progressFor(state.step) + '%';
  backBtn.style.visibility = state.history.length === 0 ? 'hidden' : 'visible';
  questionArea.innerHTML = '';

  if(state.step === 'q2'){
    questionArea.appendChild(renderQuestionHeader("What state do you live in?"));
    questionArea.appendChild(buildStateSelect((val) => {
      state.answers.homeState = val;
      goTo('q3');
    }));
  }

  else if(state.step === 'q3'){
    questionArea.appendChild(renderQuestionHeader("Will it be a physical location business, or fully online?"));
    questionArea.appendChild(buildOptions([
      { label:"Physical location", onClick: () => goTo('q4') },
      { label:"Fully online", onClick: () => goTo('q3b') }
    ]));
  }

  else if(state.step === 'q3b'){
    questionArea.appendChild(renderQuestionHeader("Will you store inventory anywhere?"));
    questionArea.appendChild(buildOptions([
      { label:"Yes, at home or a warehouse", onClick: () => goTo('q3c') },
      { label:"No inventory", onClick: () => goTo('q5') }
    ]));
  }

  else if(state.step === 'q3c'){
    questionArea.appendChild(renderQuestionHeader(`Will that inventory stay in ${state.answers.homeState}, or will it be stored somewhere else?`));
    questionArea.appendChild(buildOptions([
      { label:`Stays in ${state.answers.homeState}`, onClick: () => { state.flags.inventory_home = true; goTo('q5'); } },
      { label:"Stored in another state", onClick: () => { state.flags.inventory_other_state = true; goTo('q3d'); } }
    ]));
  }

  else if(state.step === 'q3d'){
    questionArea.appendChild(renderQuestionHeader("Which state will the inventory be stored in?"));
    questionArea.appendChild(buildStateSelect((val) => {
      state.answers.inventoryState = val;
      goTo('q5');
    }));
  }

  else if(state.step === 'q4'){
    questionArea.appendChild(renderQuestionHeader(`Will the business operate in just ${state.answers.homeState}, or in other states too?`));
    questionArea.appendChild(buildOptions([
      { label:`Just ${state.answers.homeState}`, onClick: () => goTo('q5') },
      { label:"Other states too", onClick: () => { state.flags.multi_state = true; goTo('q4b'); } }
    ]));
  }

  else if(state.step === 'q4b'){
    questionArea.appendChild(renderQuestionHeader("Which state will you operate in most?"));
    questionArea.appendChild(buildStateSelect((val) => {
      state.answers.nexusState = val;
      goTo('q5');
    }));
  }

  else if(state.step === 'q5'){
    questionArea.appendChild(renderQuestionHeader("Are you planning to raise outside investment? Angel investors or venture capital — not family or friends putting in money."));
    questionArea.appendChild(buildOptions([
      { label:"Yes", onClick: () => { state.answers.investment = true; goTo('q6'); } },
      { label:"No", onClick: () => goTo('q6') }
    ]));
  }

  else if(state.step === 'q6'){
    questionArea.appendChild(renderQuestionHeader("When you form an LLC, your name and address go on the public record. There are two ways to protect that: a registered agent keeps your address off, and forming in Wyoming keeps your name off too. Which matters to you?"));
    questionArea.appendChild(buildOptions([
      { label:"Just my address", onClick: () => { state.flags.privacy_address = true; state.answers.privacy = 'address'; goTo('result'); } },
      { label:"Both my name and address", onClick: () => { state.answers.privacy = 'both'; goTo('result'); } },
      { label:"Not concerned", onClick: () => { state.answers.privacy = 'none'; goTo('result'); } }
    ]));
  }

  else if(state.step === 'result'){
    showResult();
  }
}

function getNexusState(){
  return state.flags.multi_state ? state.answers.nexusState : state.answers.homeState;
}

function getFormationState(){
  return getNexusState();
}

function showResult(){
  quizCard.classList.add('hidden');
  resultArea.classList.remove('hidden');
  progressFill.style.width = '100%';

  const homeState = state.answers.homeState;
  const nexusState = getNexusState();
  const formationState = getFormationState();

  let bannerClass, eyebrow, headline, reason, recommendedState;

  if(state.answers.investment){
    bannerClass = 'blue';
    eyebrow = 'Recommended formation state';
    headline = 'Delaware';
    reason = "They're raising outside money — investors expect a Delaware entity.";
    recommendedState = 'Delaware';
  } else if(state.answers.privacy === 'both'){
    bannerClass = 'gold';
    eyebrow = 'Recommended formation state';
    headline = 'Wyoming';
    reason = "They want their name off the public record — Wyoming doesn't list member names.";
    recommendedState = 'Wyoming';
  } else {
    bannerClass = 'green';
    eyebrow = 'Recommended formation state';
    headline = `Form in ${formationState}`;
    recommendedState = formationState;
    if(state.answers.privacy === 'address'){
      reason = `A registered agent keeps their address off the public record without needing to form out of state.`;
    } else {
      reason = `Forming where they actually do business keeps things simple and avoids extra filings.`;
    }
  }

  const operatingState = nexusState;
  const formingOutOfState = recommendedState !== operatingState;

  const notes = [];
  if(formingOutOfState){
    notes.push(`They're forming in ${recommendedState}, but operate out of ${operatingState} — they'll need a registered agent in ${recommendedState}, and will likely need to register as a foreign LLC in ${operatingState}.`);
  }
  if(state.flags.multi_state){
    notes.push(`They also operate in other states beyond ${operatingState} — those will likely need separate foreign LLC registrations too.`);
  }
  if(state.flags.inventory_home){
    notes.push(`Inventory stored at home still creates nexus — ${homeState} formation likely applies.`);
  }
  if(state.flags.inventory_other_state){
    notes.push(`Inventory stored in ${state.answers.inventoryState} creates nexus there too — on top of forming in ${recommendedState}, they'll likely need a foreign LLC registration in ${state.answers.inventoryState}.`);
  }

  const diyState = recommendedState;

  const playbookSteps = [];
  playbookSteps.push(`<strong>Recommend the state:</strong> Tell them to form in <strong>${recommendedState}</strong> — ${reason}`);

  if(state.flags.inventory_other_state){
    playbookSteps.push(`<strong>Call out the inventory situation:</strong> Since their inventory sits in ${state.answers.inventoryState}, that state has nexus too — they'll need a foreign LLC registration there in addition to forming in ${recommendedState}.`);
  } else if(state.flags.inventory_home){
    playbookSteps.push(`<strong>Call out the inventory situation:</strong> Their inventory stays in ${homeState}, so it doesn't add a second state — ${homeState} formation already covers it.`);
  }

  if(formingOutOfState){
    playbookSteps.push(`<strong>Call out the registered agent requirement:</strong> Forming in ${recommendedState} means they need a registered agent there, plus a foreign LLC registration in ${operatingState} since that's where they actually operate. Northwest includes registered agent service free for the first year, plus a domain, website, business phone line, and email with formation.`);
  } else {
    playbookSteps.push(`<strong>Offer to handle it:</strong> Northwest can form the LLC, plus registered agent, domain, business email, and phone number — $39 + state fees.`);
  }

  playbookSteps.push(`<strong>If they want to DIY:</strong> Search "${diyState} LLC Secretary of State," create an account, file the Articles of Organization, and pay the state fee. Remind them to check annual report requirements — missing one can get the business shut down.`);

  resultArea.innerHTML = `
    <div class="banner ${bannerClass}">
      <p class="eyebrow">${eyebrow}</p>
      <h2>${headline}</h2>
      <p>${reason}</p>
    </div>
    ${notes.length ? `<div class="notes">${notes.map(n => `<div class="note">${n}</div>`).join('')}</div>` : ''}
    <div class="playbook-card">
      <h3>Next steps for you</h3>
      <ol>
        ${playbookSteps.map(s => `<li>${s}</li>`).join('')}
      </ol>
    </div>
    <div class="start-over-row">
      <button class="start-over-btn" id="startOverBtn">Start Over</button>
    </div>
  `;
  document.getElementById('startOverBtn').onclick = startOver;
}

backBtn.addEventListener('click', goBack);

render();
</script>
</body>
</html>
